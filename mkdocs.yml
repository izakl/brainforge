# MkDocs configuration for the Brain Factory documentation site.
# Build:   pip install mkdocs-material && mkdocs build
# Preview: mkdocs serve
# Published to GitHub Pages by .github/workflows/docs-site.yml.
site_name: Brain Factory
site_description: A hub that gives every project an upgradeable, runtime-agnostic brain for AI-assisted delivery.
site_url: https://izakl.github.io/brainforge/
repo_url: https://github.com/izakl/brainforge
repo_name: izakl/brainforge
docs_dir: docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

# The site builds from docs/. Files outside docs/ (AGENTS.md, brain-factory/,
# examples/) are linked to GitHub as absolute URLs; do not fail on those.
validation:
  nav:
    omitted_files: ignore
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    not_found: ignore

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/izakl/brainforge

