name: Check SVG companions

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/diagrams/**/*.svg"
      - "scripts/check-svg-companions.sh"

permissions:
  contents: read

jobs:
  check-svg-companions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Check Mermaid SVG companions
        run: bash scripts/check-svg-companions.sh
