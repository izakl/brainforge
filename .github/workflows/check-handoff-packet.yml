name: Check handoff packet

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/check-handoff-packet.sh"
      - ".github/workflows/check-handoff-packet.yml"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-handoff-packet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Check handoff packet convention coverage
        run: bash scripts/check-handoff-packet.sh
