name: Dependency review

# Flags pull requests that introduce dependencies with known vulnerabilities.
# The dependency graph it relies on is free on PUBLIC repositories, so this runs
# only on the public `brainforge` mirror (skipped on the private source repo).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    if: github.event.repository.name == 'brainforge'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v4
        with:
          fail-on-severity: high
