name: Markdown

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown.yml"
      - ".markdownlint.jsonc"
      - ".github/markdown-link-check.json"
      - "scripts/check-mobile-quick-action.sh"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md

  link-check-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check markdown links (modified files)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          check-modified-files-only: 'yes'
          base-branch: 'main'
          config-file: '.github/markdown-link-check.json'

  link-check-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check markdown links (full scan)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/markdown-link-check.json'

  check-mobile-quick-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check mobile quick-action convention coverage
        run: bash scripts/check-mobile-quick-action.sh
