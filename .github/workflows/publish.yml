name: Publish packages

# Publish the `brainfactory` CLI to PyPI and npm whenever a GitHub Release is
# published. Triggered by the `release` event, so it fires for both release
# paths — a vX.Y.Z tag (cut by release.yml) and a Release drafted in the GitHub
# UI. Also exposes `workflow_dispatch` so a maintainer can re-run the publish
# directly (e.g. after a registry-side fix) without cutting a new Release —
# both publishes are idempotent, so a manual run is always safe. Gated to the
# public repo (brainforge); the private source repo, which never cuts releases,
# skips it.
#
# Package versions are independent of the framework version: PyPI publishes
# `brainfactory.__version__` and npm publishes installers/npm/package.json's
# `version`. Both publishes are idempotent — if that version is already on the
# registry the step is a no-op — so cutting a framework release without bumping
# the CLI, or re-running a release, never fails here. Bump those two versions to
# ship a new CLI build. See RELEASING.md for the one-time registry setup.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    name: Publish to PyPI
    if: github.event.repository.name == 'brainforge'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing (no stored token)
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.x"

      - name: Build sdist + wheel
        working-directory: brain-factory/adapters/python
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: brain-factory/adapters/python/dist
          skip-existing: true

  npm:
    name: Publish to npm
    if: github.event.repository.name == 'brainforge'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for npm Trusted Publishing (+ automatic provenance)
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      - name: Publish to npm (Trusted Publishing / OIDC, skip if already published)
        working-directory: installers/npm
        run: |
          # Trusted Publishing needs npm >= 11.5.1; the runner's bundled npm is older,
          # so self-upgrade, then `hash -r` to drop the shell's cached path to the old
          # npm binary and guarantee the upgraded npm (with OIDC support) runs below.
          npm install -g npm@latest
          hash -r
          echo "diag: npm $(npm --version) / node $(node --version) / OIDC-endpoint ${ACTIONS_ID_TOKEN_REQUEST_URL:+present}${ACTIONS_ID_TOKEN_REQUEST_URL:-MISSING}"
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "${name}@${ver} already published; skipping."
          else
            npm publish --access public
          fi
