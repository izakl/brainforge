version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codeql-action:
        applies-to: "version-updates"
        patterns:
          - "github/codeql-action/*"
        exclude-patterns:
          - "github/codeql-action/analyze"
      codeql-action-security:
        applies-to: "security-updates"
        patterns:
          - "github/codeql-action/*"
